<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roro split</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/push.css" />
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <h1 class="text-center mx-auto my-4">Push day</h1>

    <div class="container bg-light">
      <div class="row g-4">
        <div class="col-12">
          <div class="inner">
              <div class="card">
                  <img src="./Images/flat dp.webp" class="card-img-top" alt="..." />
                  <div class="card-body">
                  <p class="card-text">Flat dumbell press</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/Tricep-pushdown-movement_ddb8dbd8-566d-4f55-99e0-36c35790234a_1224x.webp"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">tricpes pushdown</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/Dumbbell-Standing-Alternate-Front-Raise-resized.webp"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Front raise</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/incl mch.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Incline chest press</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/lateral raises.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Lateral raise</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/tri dumb.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Overhead extension</p>
              </div>
            </div>
          </div>
        </div>

    <script src="./JS/main.js"></script>
  </body>
</html>
