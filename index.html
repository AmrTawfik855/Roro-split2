<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roro split</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/main.css" />
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <header class="hero vh-100 d-flex justify-content-center align-items-start">
      <img
        src="./Images/Gemini_Generated_Image_e8m8rne8m8rne8m8.png"
        alt="roro"
        class="hero-img" />
      <div class="overlay"></div>
      <div class="content">
        <h1 class="text-center mt-5">Roro's Gym Split</h1>
        <p class="text-center fs-5 mt-3">
          This workout split was designed
          <span class="fst-italic">specifically</span> for Roro to help her
          build muscle.
        </p>
      </div>
    </header>

    <div class="container">
      <div class="inner my-5">
        <div class="buttons d-flex flex-column align-items-center gap-5 mb-4">
          <div class="push-button">
            <img
              src="./Images/Push.jpg"
              alt="push"
              id="push"
              style="cursor: pointer" />
          </div>
          <div class="pull-button">
            <img
              src="./Images/Pull.jpg"
              alt="pull"
              id="pull"
              style="cursor: pointer" />
          </div>
          <div class="legs-button">
            <img
              src="./Images/Legs.jpg"
              alt="legs"
              id="legs"
              style="cursor: pointer" />
          </div>
        </div>
      </div>
    </div>

    <script src="./JS/main.js"></script>
  </body>
</html>
