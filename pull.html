<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roro split</title>
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/pull.css" />
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <h1 class="text-center mx-auto my-4">Pull day</h1>

    <div class="container bg-light">
      <div class="row g-4">
        <div class="col-12">
          <div class="inner">
              <div class="card">
                  <img src="./Images/lats.webp" class="card-img-top" alt="..." />
                  <div class="card-body">
                  <p class="card-text">Lat pull down</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/bi.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Bicep curls</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/rear.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Rear delts fly</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/upper back.webp"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Upper back row</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/hammer.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Hammer curls</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="inner">
            <div class="card">
              <img
                src="./Images/back ex.jpg"
                class="card-img-top"
                alt="..." />
              <div class="card-body">
                <p class="card-text">Back extension</p>
              </div>
            </div>
          </div>
        </div>

    <script src="./JS/main.js"></script>
  </body>
</html>
